version: '3.8'

services:
  identity-validator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: salesforce-identity-validator
    ports:
      - "8000:8000"
    environment:
      - AZURE_ENDPOINT=${AZURE_ENDPOINT}
      - AZURE_API_KEY=${AZURE_API_KEY}
      - DEBUG=False
      - LOG_LEVEL=INFO
    networks:
      - validator-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  validator-network:
    driver: bridge
